name: Server

on:
    pull_request:
        paths-ignore:
            - "**.css"
            - "**.js"
            - "**.md"
            - "**.html"
            - "**.csv"
            - "**.po"
            - "**.pot"
    schedule:
        # Run everday at midnight UTC / 5:30 IST
        - cron: "0 0 * * *"
env:
    CRM_BRANCH: ${{ github.base_ref || github.ref_name }}

concurrency:
    group: develop-crm-${{ github.event.number }}
    cancel-in-progress: true

jobs:
    setup:
        name: Resolve frappe matrix
        runs-on: ubuntu-latest
        outputs:
            matrix: ${{ steps.resolve.outputs.matrix }}
        steps:
            - name: Resolve frappe matrix from target branch
              id: resolve
              run: |
                  BASE="${{ github.base_ref || github.ref_name }}"
                  # Pair each frappe branch with a Python it supports:
                  # frappe v15 needs >=3.10,<3.15; v16 and develop need >=3.14.
                  if [ "$BASE" = "develop" ]; then
                      echo 'matrix={"include":[{"frappe-branch":"develop","python-version":"3.14"}]}' >> "$GITHUB_OUTPUT"
                  else
                      echo 'matrix={"include":[{"frappe-branch":"version-15","python-version":"3.10"},{"frappe-branch":"version-16","python-version":"3.14"}]}' >> "$GITHUB_OUTPUT"
                  fi

    test:
        name: Tests (frappe ${{ matrix.frappe-branch }})
        needs: setup
        runs-on: ubuntu-latest
        timeout-minutes: 60
        strategy:
            fail-fast: false
            matrix: ${{ fromJson(needs.setup.outputs.matrix) }}

        services:
            mysql:
                image: mariadb:10.6
                env:
                    MYSQL_ROOT_PASSWORD: root
                ports:
                    - 3306:3306
                options: --health-cmd="mysqladmin ping" --health-interval=5s --health-timeout=2s --health-retries=3

        steps:
            - name: Clone
              uses: actions/checkout@v6

            - name: Setup environment
              uses: ./.github/actions/setup-server-env
              with:
                  python-version: ${{ matrix.python-version }}
                  node-version: "24"
                  type: "server"
