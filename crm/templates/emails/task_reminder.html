<div
  style="
    font-family:
      -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, Roboto,
      Helvetica, Arial, sans-serif;
    max-width: 600px;
    margin: 0 auto;
    padding: 40px 24px;
    color: #1f2937;
  "
>
  <style>
    @media (max-width: 600px) {
      .detail-table {
        border: none !important;
        background: transparent !important;
      }

      .detail-table tbody,
      .detail-table tr {
        display: block !important;
      }

      .detail-table tr {
        margin-bottom: 12px !important;
        border: 1px solid #e5e7eb !important;
        border-radius: 8px !important;
        overflow: hidden !important;
      }

      .detail-table tr:last-child {
        margin-bottom: 0 !important;
      }

      .detail-label-cell,
      .detail-value-cell {
        display: block !important;
        width: 100% !important;
        box-sizing: border-box !important;
        border-right: none !important;
        border-bottom: none !important;
      }

      .detail-label-cell {
        padding-bottom: 12px !important;
        background-color: transparent !important;
      }

      .detail-value-cell {
        padding-top: 0px !important;
        padding-bottom: 14px !important;
        background-color: transparent !important;
      }

      .btn-table {
        width: 100% !important;
      }

      .btn-table td {
        display: block !important;
        width: 100% !important;
      }

      .btn-table a {
        display: block !important;
        width: 100% !important;
        box-sizing: border-box !important;
        text-align: center !important;
        padding: 12px 20px !important;
      }
    }

    @media (prefers-color-scheme: dark) {
      .email-heading {
        color: #f5f5f5 !important;
      }

      .email-subtext {
        color: #a3a3a3 !important;
      }

      .detail-table {
        border-color: #333333 !important;
      }

      .detail-table tr {
        border-color: #333333 !important;
      }

      .detail-label-cell {
        background-color: #1f1f1f !important;
        border-color: #333333 !important;
        color: #d4d4d4 !important;
      }

      .detail-value-cell {
        background-color: #171717 !important;
        border-color: #333333 !important;
        color: #e5e5e5 !important;
      }

      .detail-label-text {
        color: #d4d4d4 !important;
      }

      .detail-value-text {
        color: #e5e5e5 !important;
      }

      .email-footer {
        border-color: #333333 !important;
      }

      .footer-text {
        color: #737373 !important;
      }

      .footer-link {
        color: #737373 !important;
      }
    }
  </style>

  <div>
    <!-- Logo -->
    <table
      cellpadding="0"
      cellspacing="0"
      border="0"
      style="margin-bottom: 20px"
    >
      <tr>
        <td>
          <img
            src="{{ brand_logo }}"
            alt="CRM"
            width="48"
            height="48"
            style="
              vertical-align: middle;
              border-radius: 12px;
              display: inline-block;
              line-height: 48px;
              text-align: center;
            "
          />
        </td>
      </tr>
    </table>

    <!-- Heading -->
    <h1
      class="email-heading"
      style="
        font-size: 20px;
        font-weight: 700;
        color: #111827;
        margin: 0 0 12px 0;
        line-height: 1.3;
      "
    >
      Your task is due in {{ time_remaining }}.
    </h1>

    <!-- Subtext -->
    <p
      class="email-subtext"
      style="
        font-size: 14px;
        color: #6b7280;
        margin: 0 0 20px 0;
        line-height: 1.6;
      "
    >
      Hey <b>{{ assigned_to_name }}</b>, please review the details below and
      take action before the deadline.
    </p>

    <!-- Details Table -->
    <table
      class="detail-table"
      cellpadding="0"
      cellspacing="0"
      border="0"
      style="
        width: 100%;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        border-collapse: separate;
        border-spacing: 0;
        margin-bottom: 20px;
        overflow: hidden;
      "
    >
      <!-- Task Title Row -->
      <tr>
        <td
          class="detail-label-cell"
          style="
            padding: 14px 16px;
            border-bottom: 1px solid #e5e7eb;
            border-right: 1px solid #e5e7eb;
            width: 160px;
            vertical-align: middle;
          "
        >
          <div style="display: flex; align-items: center; gap: 8px">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="lucide lucide-list-todo-icon lucide-list-todo"
            >
              <path d="M13 5h8" />
              <path d="M13 12h8" />
              <path d="M13 19h8" />
              <path d="m3 17 2 2 4-4" />
              <rect x="3" y="4" width="6" height="6" rx="1" />
            </svg>
            <span
              class="detail-label-text"
              style="font-size: 14px; color: #6b7280; font-weight: 500"
              >Title</span
            >
          </div>
        </td>
        <td
          class="detail-value-cell"
          style="
            padding: 14px 16px;
            border-bottom: 1px solid #e5e7eb;
            vertical-align: middle;
          "
        >
          <span
            class="detail-value-text"
            style="font-size: 14px; color: #1f2937; font-weight: 500"
            >{{ task_title }}</span
          >
        </td>
      </tr>

      {% if description %}
      <!-- Description Row -->
      <tr>
        <td
          class="detail-label-cell"
          style="
            padding: 14px 16px;
            /* background-color: #f9fafb; */
            border-bottom: 1px solid #e5e7eb;
            border-right: 1px solid #e5e7eb;
            width: 160px;
            vertical-align: middle;
          "
        >
          <div style="display: flex; align-items: center; gap: 8px">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="lucide lucide-text-align-start-icon lucide-text-align-start"
            >
              <path d="M21 5H3" />
              <path d="M15 12H3" />
              <path d="M17 19H3" />
            </svg>
            <span
              class="detail-label-text"
              style="font-size: 14px; color: #6b7280; font-weight: 500"
              >Description</span
            >
          </div>
        </td>
        <td
          class="detail-value-cell"
          style="
            padding: 14px 16px;
            border-bottom: 1px solid #e5e7eb;
            vertical-align: middle;
          "
        >
          <span
            class="detail-value-text"
            style="font-size: 14px; color: #1f2937"
            >{{ description }}</span
          >
        </td>
      </tr>
      {% endif %}

      <!-- Due Date Row -->
      <tr>
        <td
          class="detail-label-cell"
          style="
            padding: 14px 16px;
            border-right: 1px solid #e5e7eb;
            width: 160px;
            vertical-align: middle;
          "
        >
          <div style="display: flex; align-items: center; gap: 8px">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="lucide lucide-calendar-icon lucide-calendar"
            >
              <path d="M8 2v4" />
              <path d="M16 2v4" />
              <rect width="18" height="18" x="3" y="4" rx="2" />
              <path d="M3 10h18" />
            </svg>
            <span
              class="detail-label-text"
              style="font-size: 14px; color: #6b7280; font-weight: 500"
              >Due Date</span
            >
          </div>
        </td>
        <td
          class="detail-value-cell"
          style="padding: 14px 16px; vertical-align: middle"
        >
          <span
            class="detail-value-text"
            style="font-size: 14px; color: #1f2937; font-weight: 500"
            >{{ due_date }}</span
          >
        </td>
      </tr>
    </table>

    <!-- Open Task Button -->
    <table
      class="btn-table"
      cellpadding="0"
      cellspacing="0"
      border="0"
      style="margin-bottom: 36px"
    >
      <tr>
        <td>
          <a
            href="{{ task_url }}"
            style="
              display: inline-block;
              padding: 8px 10px;
              background-color: #111827;
              color: #ffffff;
              text-decoration: none;
              border-radius: 8px;
              font-size: 14px;
              font-weight: 400;
              line-height: 1;
            "
            >Open task &rarr;</a
          >
        </td>
      </tr>
    </table>
  </div>
</div>
